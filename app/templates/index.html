<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}?v=1.3">
</head>

<body>
    <header class="hero mb-5 shadow-sm">
        <div class="container text-center">
            <h1><i class="bi bi-cpu-fill me-2"></i> StockWise AI</h1>
            <p class="lead opacity-75">Inteligencia Predictiva para la Gestión de Inventario</p>
        </div>
    </header>

    <main class="container">
        <div class="row g-4">
            
            <!-- PANEL IZQUIERDO: CONTROL E INVENTARIO -->
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h5 class="fw-bold mb-4">
                        <i class="bi bi-box-seam card-title-icon"></i>Producto
                    </h5>
                    
                    <label class="form-label small text-muted">Artículo a analizar:</label>
                    <select id="productSelect" class="form-select form-select-lg mb-4" onchange="loadData()">
                        {% for p in products %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>

                    <div class="prediction-box text-center shadow-sm">
                        <div class="prediction-label" id="predictionLabel">Venta Estimada (Mañana)</div>
                        <div id="predValue" class="prediction-value">--</div>
                        
                        <div class="mt-4">
                            <label class="form-label small text-muted">Horizonte de Predicción</label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="horizon" id="h24" value="1" checked onchange="updateView()">
                                <label class="btn btn-outline-primary" for="h24">24 Horas</label>

                                <input type="radio" class="btn-check" name="horizon" id="h30" value="30" onchange="updateView()">
                                <label class="btn btn-outline-primary" for="h30">30 Días</label>
                            </div>
                        </div>
                    </div>

                    <!-- ESTADO DE STOCK (VISIBLE SOLO AL CARGAR DATOS) -->
                    <div id="inventoryStatusCard" class="mt-4 d-none">
                        <h6 class="fw-bold mb-3"><i class="bi bi-shield-check me-2"></i>Estado del Stock</h6>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted small">En almacén:</span>
                            <span id="stockCurrent" class="fw-bold">--</span>
                        </div>

                        <div class="progress mb-3" style="height: 10px;">
                            <div id="stockBar" class="progress-bar" role="progressbar"></div>
                        </div>

                        <div id="statusBadge" class="status-badge text-center text-white">--</div>

                        <div class="recommendation-box shadow-sm" id="recommendationBox">
                            <small class="d-block text-muted">Sugerencia de compra:</small>
                            <strong id="buyValue">-- unidades</strong>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PANEL DERECHO: ANÁLISIS VISUAL -->
            <div class="col-md-8">
                <div class="card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0">
                            <i class="bi bi-graph-up-arrow card-title-icon"></i>Análisis de Tendencia
                        </h5>
                        <div class="badge bg-light text-dark border p-2">
                            <i class="bi bi-clock-history me-1"></i> Historial vs IA
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 {{ app_name }} | Desarrollado con Python, FastAPI y Machine Learning</p>
    </footer>

    <script>
        let myChart;
        let globalData;

        async function loadData() {
            const productId = document.getElementById('productSelect').value;
            const response = await fetch(`/api/chart-data/${productId}`);
            
            if (!response.ok) {
                console.error("Error en la API");
                return;
            }
            
            globalData = await response.json();
            updateView();
        }

        function updateView() {
            if (!globalData || !globalData.history || !globalData.forecast) return;

            const horizon = document.querySelector('input[name="horizon"]:checked').value
            const ctx = document.getElementById('salesChart').getContext('2d')

            const inv = globalData.inventory
            const stats = (horizon === "1") ? inv.day : inv.month

            document.getElementById('inventoryStatusCard').classList.remove('d-none')
            document.getElementById('stockCurrent').innerText = inv.current + " uds"
            document.getElementById('buyValue').innerText = stats.recommendation + " uds"

            const statusBadge = document.getElementById('statusBadge')
            statusBadge.innerText = "Estado: " + stats.status
            statusBadge.className = `status-badge text-center text-white bg-${stats.color}`

            const stockBar = document.getElementById('stockBar')
            const percent = Math.min(100, (inv.current / stats.demand) * 100)
            stockBar.style.width = percent + "%"
            stockBar.className = `progress-bar bg-${stats.color}`

            const recLabel = document.getElementById('recommendationBox').querySelector('small')
            recLabel.innerText = (horizon === "1") ? "Compra urgente para mañana:" : "Pedido sugerido para el mes:"

            let labels, historyValues, forecastValues, displayPrediction
            const historyLabels = globalData.history.map(h => h.date)
            historyValues = globalData.history.map(h => h.value)

            if (horizon === "1") {
                // MODO 24 HORAS
                const tomorrow = globalData.forecast[0]
                labels = [...historyLabels, tomorrow.date]
                forecastValues = [...Array(historyValues.length - 1).fill(null), historyValues[historyValues.length - 1], tomorrow.value]
                displayPrediction = tomorrow.value
                document.getElementById('predictionLabel').innerText = "Venta Estimada (Mañana)"
            } else {
                // MODO 30 DÍAS
                const forecastLabels = globalData.forecast.map(f => f.date)
                const forecastData = globalData.forecast.map(f => f.value)
                labels = [...historyLabels, ...forecastLabels]
                forecastValues = [...Array(historyValues.length - 1).fill(null), historyValues[historyValues.length - 1], ...forecastData]
                displayPrediction = globalData.forecast.reduce((a, b) => a + b.value, 0).toFixed(0)
                document.getElementById('predictionLabel').innerText = "Demanda Total Mes"
            }

            document.getElementById('predValue').innerText = displayPrediction

            if (myChart) { myChart.destroy() }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ventas Reales',
                        data: historyValues,
                        borderColor: '#306bac',
                        backgroundColor: 'rgba(48, 107, 172, 0.1)',
                        fill: true,
                        tension: 0.4
                    }, {
                        label: 'Proyección SockWise',
                        data: forecastValues,
                        borderColor: '#918ef4',
                        borderWidth: 3,
                        borderDash: [6, 6],
                        pointBackgroundColor: '#918ef4',
                        pointRadius: horizon === "1" ? 7 : 2,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    mainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', align: 'end' }
                    },
                    scales: {
                        y: { beginAtZero: true},
                        x: { grid: {display: false } }
                    }
                }
            })

        }

        window.onload = loadData;
    </script>
</body>
</html>
